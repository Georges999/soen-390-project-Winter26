appId: host.exp.Exponent
---
# Navigate to Indoor Map
- launchApp
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd

# Open indoor tab
- extendedWaitUntil:
    visible:
      id: "tab-indoor"
    timeout: 25000
- tapOn:
    id: "tab-indoor"
- waitForAnimationToEnd

# Wait for indoor content
- extendedWaitUntil:
    visible: "Indoor Map"
    timeout: 10000

# Default SGW selection
- assertVisible: "SGW"
- assertVisible: "Hall Building"
- assertVisible: "Floor 8"

# Switch building within campus
- tapOn: "John Molson Building"
- waitForAnimationToEnd

# Confirm new building floors
- assertVisible: "John Molson Building"
- assertVisible: "Floor S2"
- assertNotVisible: "Floor 8"

# go to another floor
- tapOn: "1"
- waitForAnimationToEnd
- assertVisible: "Floor 1"
- assertNotVisible: "Floor S2"

# Swap campus 
- tapOn: "Loyola"
- waitForAnimationToEnd

# Loyola buildings appear, SGW state is cleared
- assertVisible: "Vanier Library"
- assertNotVisible: "John Molson Building"

# Switch back to SGW - resets to Hall Building, Floor 8
- tapOn: "SGW"
- waitForAnimationToEnd
- assertVisible: "Hall Building"
- assertVisible: "Floor 8"

- tapOn: "9"
- waitForAnimationToEnd
- assertVisible: "Floor 9"

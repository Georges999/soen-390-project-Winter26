appId: host.exp.Exponent
---
# Navigate to Indoor Map
- launchApp
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd

# Open indoor tab
- extendedWaitUntil:
    visible:
      id: "tab-indoor"
    timeout: 25000
- tapOn:
    id: "tab-indoor"
- waitForAnimationToEnd

# Wait for indoor content
- extendedWaitUntil:
    visible: "Indoor Directions"
    timeout: 10000

# Default SGW selection
- assertVisible: "SGW"
- assertVisible: "Hall Building"

# Switch building within campus
- tapOn: "John Molson Building"
- waitForAnimationToEnd

# Confirm new building floors
- assertVisible: "John Molson Building"
- scrollUntilVisible:
        element:
            text: "S2"
        direction: DOWN
        timeout: 10000
- assertVisible: "S2"
- assertNotVisible: "8"

# go to another floor
- tapOn: "1"
- waitForAnimationToEnd
- assertVisible: "JMSB · Floor 1"
- assertNotVisible: "Hall Building · Floor 8"

# Swap campus 
- scrollUntilVisible:
        element:
            text: "Loyola"
        direction: UP
        timeout: 10000
- tapOn: "Loyola"
- waitForAnimationToEnd

# Loyola buildings appear, SGW state is cleared
- assertVisible: "Vanier Library"
- assertNotVisible: "John Molson Building"

# Switch back to SGW - resets to Hall Building, Floor 8
- tapOn: "SGW"
- waitForAnimationToEnd
- assertVisible: "Hall Building · Floor 1"

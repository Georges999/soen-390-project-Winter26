appId: host.exp.Exponent
---

- launchApp
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "tab-indoor"
    timeout: 25000
- tapOn:
    id: "tab-indoor"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Indoor Directions"
    timeout: 12000

- assertVisible: "Hall Building"

# Pick Hall 9 room and open directions
- tapOn:
    text: "Search start or use map pin button"
- inputText: "H937"
- extendedWaitUntil:
    visible: "H937, Floor 9 · Hall Building"
    timeout: 8000
- tapOn: "H937, Floor 9 · Hall Building"
- hideKeyboard
- waitForAnimationToEnd

# Valid route exists on Hall floor 9.
- tapOn: "Search start or use map pin button"
- eraseText
- inputText: "921"
- extendedWaitUntil:
    visible: "H921, Floor 9 · Hall Building"
    timeout: 8000
- tapOn: "H921, Floor 9 · Hall Building"

- hideKeyboard
- waitForAnimationToEnd

- assertVisible: "STEP-BY-STEP DIRECTIONS"
- assertVisible: "Start at H921"
- assertVisible:
    id: "indoor-route-overlay"
- assertVisible:
    id: "indoor-route-overlay-path"

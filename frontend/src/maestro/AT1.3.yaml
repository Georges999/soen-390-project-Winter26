appId: host.exp.Exponent
---
- launchApp
- waitForAnimationToEnd

# Open app from Expo client
- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"

# Ensure we're on SGW tab
- extendedWaitUntil:
    visible: "SGW"
    timeout: 30000
- tapOn: "SGW"
- waitForAnimationToEnd

# Wait until location/building info is ready
- extendedWaitUntil:
    visible: "Current building: Henry F. Hall Building"
    timeout: 10000

# Wait until My location appears
- extendedWaitUntil:
    visible:
      text: "My location"
      index: 0
    timeout: 10000

# Now verify it explicitly
- assertVisible:
    text: "My location"
    index: 0

# Tap My Location
- tapOn:
    text: "My location"
    index: 0
- waitForAnimationToEnd

# Select destination
- tapOn: { id: "dest-input" }
- eraseText
- inputText: "LB"

- extendedWaitUntil:
    visible: "J.W. McConnell Building"
    timeout: 5000
- tapOn: "J.W. McConnell Building"
- waitForAnimationToEnd

# Verify route renders
- extendedWaitUntil:
    visible:
      id: "route-polyline"
    timeout: 20000
- assertVisible:
    id: "route-polyline"
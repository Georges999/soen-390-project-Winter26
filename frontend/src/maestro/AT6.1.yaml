appId: host.exp.Exponent
---
- launchApp
- waitForAnimationToEnd

# Open main map (outdoor default)
- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "SGW"
    timeout: 15000

#  Outdoor POIs panel opens from info button
- tapOn:
    id: "poi-button"
- extendedWaitUntil:
    visible: "Outdoor POIs"
    timeout: 8000

# : Nearest/Range toggle and radius stepper update
- assertVisible: "Nearest"
- assertVisible: "Range"
- tapOn: "Range"
- assertVisible: "Range (meters)"
- assertVisible: "1000"
- tapOn: "-"
- assertVisible: "900"
- tapOn: "+"
- tapOn: "+"
- assertVisible: "1100"
- tapOn: "Nearest"
- assertVisible: "Show nearest"

# Category chips render and selection changes
- assertVisible: "Coffee"
- assertVisible: "Food"
- assertVisible: "Study"
- tapOn: "Food"
- waitForAnimationToEnd

#  Fetch POIs and show list items with name/rating/distance
- tapOn: "Show on map"
- waitForAnimationToEnd

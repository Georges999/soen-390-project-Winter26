appId: host.exp.Exponent
---
- launchApp
- waitForAnimationToEnd

# Navigate to Campus Guide
- tapOn:
    text: "Campus Guide"
- waitForAnimationToEnd

# Go to Indoor tab
- extendedWaitUntil:
    visible:
      id: "tab-indoor"
    timeout: 25000
- tapOn:
    id: "tab-indoor"
- waitForAnimationToEnd

# Wait for Indoor Map screen
- extendedWaitUntil:
    visible: "Indoor Directions"
    timeout: 10000

# Tap the indoor room search input
- tapOn:
    text: "Search start or use map pin button"
- waitForAnimationToEnd

# Type a partial room code to trigger suggestions
- inputText: "H20"

# Wait for suggestions to appear
- extendedWaitUntil:
    visible: "H209, Floor 2 · Hall Building"
    timeout: 10000

- tapOn:
    text: "H209, Floor 2 · Hall Building"
- waitForAnimationToEnd
- eraseText


# Verify empty input does not break the UI
- assertVisible:
    text: "Search start or use map pin button"

# Enter an invalid room code
- inputText: "ZZ9999"
- waitForAnimationToEnd

# Verify the app remains stable and usable after invalid input
- assertVisible:
    text: "Search start or use map pin button"
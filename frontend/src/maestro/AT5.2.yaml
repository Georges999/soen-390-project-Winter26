appId: host.exp.Exponent
---

# AT5.2: Class Floor to Destination (Same Campus, Different Building)
# Scenario scope: Hall Building -> John Molson Building (JMSB)

- launchApp
- waitForAnimationToEnd

# Open Campus Guide
- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd

# Navigate to Indoor tab
- extendedWaitUntil:
    visible:
      id: "tab-indoor"
    timeout: 25000
- tapOn:
    id: "tab-indoor"
- waitForAnimationToEnd

# Confirm Indoor Map screen is loaded
- extendedWaitUntil:
    visible: "Indoor Directions"
    timeout: 12000

# Start on Hall floor 8
- tapOn:
    text: "Search start or use map pin button"
- inputText: "H837"
- extendedWaitUntil:
    visible: "H837.*"
    timeout: 8000
- tapOn: "H837,.*"
- hideKeyboard
- waitForAnimationToEnd


# Select destination room in JMSB (same campus)
- tapOn:
    text: "Search destination or use map pin button"
- inputText: "MB1.309"
- extendedWaitUntil:
    visible: "MB1.309.*"
    timeout: 8000
- tapOn: "MB1.309,.*"
- hideKeyboard
- waitForAnimationToEnd

# Verify route generation for Hall -> JMSB
- assertVisible: "Indoor Directions"
- assertVisible: "Floor-by-floor journey"
- assertVisible:
    id: "indoor-route-overlay"
- assertVisible:
    id: "indoor-route-overlay-path"

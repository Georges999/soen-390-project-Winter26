appId: host.exp.Exponent
---
- launchApp
- waitForAnimationToEnd

# Open main map (outdoor default)
- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "SGW"
    timeout: 15000

# Set default origin to Hall Building for POI search
- tapOn:
    id: "start-input"
- eraseText
- inputText: "Hall"
- extendedWaitUntil:
    visible: "Henry F. Hall Building"
    timeout: 8000
- tapOn: "Henry F. Hall Building"
- waitForAnimationToEnd
- hideKeyboard
- waitForAnimationToEnd

- tapOn:
    id: "poi-button"
- extendedWaitUntil:
    visible: "Outdoor POIs"
    timeout: 8000

- assertVisible: "Coffee"
- tapOn: "Coffee"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Show on map"
    timeout: 10000


# Tap a coffee POI from the list and show it on the map
- tapOn: "Show on map"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
        id: "poi-list-item"
    timeout: 15000
- tapOn:
    id: "poi-list-item"
    index: 0
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
        id: "poi-info-card"
    timeout: 10000
- assertVisible:
    id: "poi-get-directions-btn"
- tapOn:
    id: "poi-get-directions-btn"
- waitForAnimationToEnd

# Directions view should open with origin and destination fields
- extendedWaitUntil:
    visible:
        id: "start-input"
    timeout: 15000
- extendedWaitUntil:
    visible:
        id: "dest-input"
    timeout: 15000

# Transport mode buttons and Go button
- extendedWaitUntil:
    visible: ", Walk"
    timeout: 15000
- tapOn: ", Walk"
- waitForAnimationToEnd
- assertVisible: ", Car"
- tapOn: ", Car"
- waitForAnimationToEnd
- assertVisible: ", Bike"
- tapOn: ", Bike"
- waitForAnimationToEnd
- assertVisible:
    id: "go-btn"

appId: host.exp.Exponent
---

- launchApp
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Campus Guide"
    timeout: 30000
- tapOn: "Campus Guide"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "tab-indoor"
    timeout: 25000
- tapOn:
    id: "tab-indoor"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Indoor Directions"
    timeout: 12000

# Accessibility mode exists
- assertVisible:
    id: "accessibility-toggle-row"
- assertVisible:
    id: "accessibility-switch"

# Accessibility routing mode toggle behavior
- assertVisible: "Uses stairs if shorter"
- tapOn:
    id: "accessibility-switch"
- assertVisible: "Avoiding stairs"
- tapOn:
    id: "accessibility-switch"
- assertVisible: "Uses stairs if shorter"

# Indoor POI data/legend exists
- assertVisible: "Washroom"
- assertVisible: "Elevator"
- assertVisible: "Stairs"

# Select a room and ensure route UI is stable
- tapOn:
    text: "Search start or use map pin button"
- inputText: "H837"
- extendedWaitUntil:
    visible: "H837.*"
    timeout: 8000
- tapOn: "H837,.*"
- hideKeyboard
- waitForAnimationToEnd


# Clear selected start room, then scroll so floor chips are safely tappable
- tapOn:
    point: "77%,21%"
- waitForAnimationToEnd
- scroll
- waitForAnimationToEnd


- scrollUntilVisible:
        element:
            text: "9"
        direction: DOWN
        timeout: 10000
- tapOn: "9"
- waitForAnimationToEnd
- assertVisible: "Hall Building · Floor 9"
- assertNotVisible:
    id: "selected-room-highlight"

# Visible for floor 9
- assertVisible: "Washroom"
- assertVisible: "Elevator"
- assertVisible: "Stairs"